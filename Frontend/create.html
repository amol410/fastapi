<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Item | FashionHub</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c5a059;
            --bg: #fdfdfd;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 0; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 30px; color: var(--primary); text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 0; box-sizing: border-box; font-size: 14px; background: #fafafa; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type="file"] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .file-btn { display: block; width: 100%; padding: 12px; background: #f0f0f0; color: #666; text-align: center; border: 1px dashed #ccc; cursor: pointer; font-size: 13px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 0; cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { background: var(--accent); }
        .back-link { display: block; text-align: center; margin-top: 25px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; text-decoration: none; }
        .back-link:hover { color: var(--primary); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h2>Add Item</h2>
        <form action="/create" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="e.g. Silk Evening Gown" required>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="text" name="price" placeholder="e.g. $299.00" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Tell us about this piece..." required></textarea>
            </div>
            <div class="form-group">
                <label>Product Image (Optional)</label>
                <div class="file-input-wrapper">
                    <div class="file-btn" id="file-label">Click to upload image</div>
                    <input type="file" name="image" accept="image/*" onchange="document.getElementById('file-label').innerText = this.files[0].name">
                </div>
            </div>
            <button type="submit" class="btn-submit">Add to Collection</button>
        </form>
        <a href="/" class="back-link">&larr; Back to Shop</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8fafc; }
        .btn { padding: 8px 12px; border-radius: 5px; text-decoration: none; color: white; border: none; cursor: pointer; font-size: 14px;}
        .btn-blue { background-color: #3b82f6; }
        .btn-green { background-color: #10b981; }
        .btn-red { background-color: #ef4444; }
        .btn-outline { background-color: transparent; border: 1px solid #666; color: #666; }
        .badge { background-color: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <!-- New Header showing logged in user -->
        <div class="header">
            <div>
                <h2 style="margin: 0;">User Dashboard</h2>
                <p style="margin: 5px 0 0 0; color: #666;">Logged in as: <strong>{{ current_user.name }}</strong></p>
            </div>
            <div>
                <a href="/create" class="btn btn-blue">+ Add User</a>
                <a href="/logout" class="btn btn-outline" style="margin-left: 10px;">Log Out</a>
            </div>
        </div>

        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr></thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>
                        {{ user.name }}
                        {% if user.id == current_user.id %}
                            <span class="badge">YOU</span>
                        {% endif %}
                    </td>
                    <td>{{ user.email }}</td>
                    <td>
                        <a href="/update/{{ user.id }}" class="btn btn-green">Edit</a>
                        <a href="/delete/{{ user.id }}" class="btn btn-red" onclick="return confirm('Delete this user?');">Delete</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" style="text-align: center;">No users found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
